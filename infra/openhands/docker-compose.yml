services:
  openhands:
    image: ${OPENHANDS_DOCKER_IMAGE:-agentic-pr/openhands-cli:local}
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    entrypoint: ["/bin/bash", "-lc"]
    command: ["openhands --help"]
    environment:
      LOG_ALL_EVENTS: "true"
      LLM_MODEL: ${LLM_MODEL:-openai/qwen3-coder:30b}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      LLM_API_KEY: ${LLM_API_KEY:-local-llm}
      SANDBOX_VOLUMES: /workspace:/workspace:rw
      OH_PERSISTENCE_DIR: /.openhands
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${OPENHANDS_PERSISTENCE_DIR:-${HOME}/.openhands-agentic-pr}:/.openhands
      - ${OPENHANDS_REPO_PATH:-.}:/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
